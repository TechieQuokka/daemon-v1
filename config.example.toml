# Daemon V1 Configuration Example

# IPC server address (Controller communication)
ipc_address = "127.0.0.1:9000"

[bus]
# Maximum number of events in the bus queue
max_events = 10000

[storage]
# Maximum number of keys before SIEVE eviction
max_keys = 10000

# Path to shared directory for large file storage
data_layer_path = "/data_layer"
